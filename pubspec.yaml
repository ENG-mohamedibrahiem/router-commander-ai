name: router_commander_ai
description: Router Commander AI router management application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  dio: ^5.9.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  logger: ^2.7.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  responsive_framework: ^1.5.1
  connectivity_plus: ^7.1.1
  network_info_plus: ^8.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0

flutter:
  generate: true
  uses-material-design: true
